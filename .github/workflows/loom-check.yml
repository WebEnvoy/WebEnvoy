name: Loom strong governance

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, edited]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  checks: read

env:
  LOOM_VERSION: 0.21.1

jobs:
  py-compile:
    name: py-compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Compile Python files
        shell: bash
        run: |
          mapfile -d '' files < <(git ls-files -z '*.py')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No Python files tracked."
            exit 0
          fi
          python -m py_compile "${files[@]}"

  demo-bootstrap:
    name: demo-bootstrap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm install -g "@mc-and-his-agents/loom@${LOOM_VERSION}"
      - run: loom host install --host codex --scope user --apply --json
      - name: Prime Codex host state
        run: |
          mkdir -p "$HOME/.agents/plugins" "$HOME/.codex" "$HOME/.codex/plugins/cache/local-user-plugins/loom"
          cat > "$HOME/.agents/plugins/marketplace.json" <<'JSON'
          {"name":"local-user-plugins","interface":{"displayName":"Local User Plugins"},"plugins":[{"name":"loom","source":{"source":"local","path":"./plugins/loom"},"policy":{"installation":"AVAILABLE","authentication":"ON_INSTALL"},"category":"Productivity"}]}
          JSON
          cat > "$HOME/.codex/config.toml" <<TOML
          [marketplaces.local-user-plugins]
          last_updated = "2026-06-30T00:00:00Z"
          source_type = "local"
          source = "$HOME"

          [plugins."loom@local-user-plugins"]
          enabled = true
          TOML
          rm -rf "$HOME/.codex/plugins/cache/local-user-plugins/loom/0.4.0"
          cp -R "$HOME/plugins/loom" "$HOME/.codex/plugins/cache/local-user-plugins/loom/0.4.0"
      - run: loom detect --target "$GITHUB_WORKSPACE" --json
      - run: loom doctor --target "$GITHUB_WORKSPACE" --json

  repo-local-cli:
    name: repo-local-cli
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm install -g "@mc-and-his-agents/loom@${LOOM_VERSION}"
      - run: test ! -d "$GITHUB_WORKSPACE/.loom/bin"
      - run: loom version --json
      - run: loom installed-state validate --target "$GITHUB_WORKSPACE" --json

  loom-check:
    name: loom-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm install -g "@mc-and-his-agents/loom@${LOOM_VERSION}"
      - run: loom host install --host codex --scope user --apply --json
      - name: Prime Codex host state
        run: |
          mkdir -p "$HOME/.agents/plugins" "$HOME/.codex" "$HOME/.codex/plugins/cache/local-user-plugins/loom"
          cat > "$HOME/.agents/plugins/marketplace.json" <<'JSON'
          {"name":"local-user-plugins","interface":{"displayName":"Local User Plugins"},"plugins":[{"name":"loom","source":{"source":"local","path":"./plugins/loom"},"policy":{"installation":"AVAILABLE","authentication":"ON_INSTALL"},"category":"Productivity"}]}
          JSON
          cat > "$HOME/.codex/config.toml" <<TOML
          [marketplaces.local-user-plugins]
          last_updated = "2026-06-30T00:00:00Z"
          source_type = "local"
          source = "$HOME"

          [plugins."loom@local-user-plugins"]
          enabled = true
          TOML
          rm -rf "$HOME/.codex/plugins/cache/local-user-plugins/loom/0.4.0"
          cp -R "$HOME/plugins/loom" "$HOME/.codex/plugins/cache/local-user-plugins/loom/0.4.0"
      - run: loom verify --target "$GITHUB_WORKSPACE" --json
      - run: loom fact-chain --target "$GITHUB_WORKSPACE" --json
      - run: loom profile status --target "$GITHUB_WORKSPACE" --json

  loom-pr-merge-gate:
    name: loom-pr-merge-gate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm install -g "@mc-and-his-agents/loom@${LOOM_VERSION}"
      - run: loom host install --host codex --scope user --apply --json
      - name: Prime Codex host state
        run: |
          mkdir -p "$HOME/.agents/plugins" "$HOME/.codex" "$HOME/.codex/plugins/cache/local-user-plugins/loom"
          cat > "$HOME/.agents/plugins/marketplace.json" <<'JSON'
          {"name":"local-user-plugins","interface":{"displayName":"Local User Plugins"},"plugins":[{"name":"loom","source":{"source":"local","path":"./plugins/loom"},"policy":{"installation":"AVAILABLE","authentication":"ON_INSTALL"},"category":"Productivity"}]}
          JSON
          cat > "$HOME/.codex/config.toml" <<TOML
          [marketplaces.local-user-plugins]
          last_updated = "2026-06-30T00:00:00Z"
          source_type = "local"
          source = "$HOME"

          [plugins."loom@local-user-plugins"]
          enabled = true
          TOML
          rm -rf "$HOME/.codex/plugins/cache/local-user-plugins/loom/0.4.0"
          cp -R "$HOME/plugins/loom" "$HOME/.codex/plugins/cache/local-user-plugins/loom/0.4.0"
      - run: loom flow pr-gate check --target "$GITHUB_WORKSPACE" --pr "${{ github.event.pull_request.number }}" --head-sha "${{ github.event.pull_request.head.sha }}" --json
